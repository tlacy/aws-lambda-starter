<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — {{PROJECT_NAME}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card { background: #fff; border-radius: 16px; padding: 40px 32px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { color: #64748b; font-size: .95rem; }
    .btn { display: inline-block; margin-top: 20px; padding: 12px 28px; background: #4f46e5; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="icon">⏳</div>
  <h1>Verifying…</h1>
  <p>Please wait while we verify your email.</p>
</div>
<script>
  const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3000'
    : 'https://{{PROD_API_GATEWAY_ID}}.execute-api.{{AWS_REGION}}.amazonaws.com';

  async function verify() {
    const token = new URLSearchParams(window.location.search).get('token');
    const card = document.getElementById('card');

    if (!token) {
      card.innerHTML = '<div class="icon">❌</div><h1>Invalid Link</h1><p>This verification link is invalid.</p><a class="btn" href="/landing.html">Go to Login</a>';
      return;
    }

    try {
      const res = await fetch(`${API_URL}/api/auth/verify-email`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      });
      const data = await res.json();
      if (res.ok) {
        if (data.token) {
          localStorage.setItem('token', data.token);
          if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
        }
        if (data.user && data.user.status === 'active') {
          card.innerHTML = '<div class="icon">✅</div><h1>Email Verified!</h1><p>Redirecting you to the app…</p>';
          setTimeout(() => { window.location.href = '/app.html'; }, 1000);
        } else {
          card.innerHTML = '<div class="icon">✅</div><h1>Email Verified!</h1><p>Your account is pending approval. You\'ll receive an email when approved.</p><a class="btn" href="/landing.html">Go to Login</a>';
        }
      } else {
        card.innerHTML = `<div class="icon">❌</div><h1>Verification Failed</h1><p>${data.error || 'This link may have expired.'}</p><a class="btn" href="/landing.html">Try Again</a>`;
      }
    } catch {
      card.innerHTML = '<div class="icon">❌</div><h1>Connection Error</h1><p>Please try again.</p><a class="btn" href="/landing.html">Try Again</a>';
    }
  }

  verify();
</script>
</body>
</html>
