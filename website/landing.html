<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{PROJECT_NAME}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 420px; padding: 24px 16px; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; text-align: center; }
    p.subtitle { color: #666; font-size: .9rem; text-align: center; margin-bottom: 32px; }

    .tabs { display: flex; background: #e9ecef; border-radius: 10px; padding: 4px; margin-bottom: 24px; }
    .tab { flex: 1; text-align: center; padding: 8px; border-radius: 7px; cursor: pointer; font-weight: 600; font-size: .9rem; color: #666; transition: all .15s; }
    .tab.active { background: #fff; color: #1a1a2e; box-shadow: 0 1px 4px rgba(0,0,0,.12); }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; color: #333; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #dee2e6; border-radius: 8px; font-size: .95rem; outline: none; transition: border-color .15s; }
    input:focus { border-color: #4f46e5; }
    .input-wrap { position: relative; }
    .toggle-vis { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #888; font-size: .85rem; }

    .strength-list { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
    .strength-item { font-size: .78rem; padding: 3px 8px; border-radius: 20px; background: #fee2e2; color: #ef4444; transition: all .2s; }
    .strength-item.met { background: #dcfce7; color: #16a34a; }

    .btn { width: 100%; padding: 12px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .15s; margin-top: 8px; }
    .btn:hover { background: #4338ca; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .msg { padding: 12px 14px; border-radius: 8px; font-size: .9rem; margin-top: 12px; display: none; }
    .msg.error { background: #fee2e2; color: #dc2626; display: block; }
    .msg.success { background: #dcfce7; color: #16a34a; display: block; }
  </style>
</head>
<body>
<div class="container">
  <h1>{{PROJECT_NAME}}</h1>
  <p class="subtitle">Sign in to your account</p>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="showTab('login')">Sign In</div>
    <div class="tab" id="tab-register" onclick="showTab('register')">Create Account</div>
  </div>

  <!-- Login Form -->
  <div id="form-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password" />
        <button class="toggle-vis" onclick="toggleVis('login-password', this)">Show</button>
      </div>
    </div>
    <button class="btn" id="btn-login" onclick="login()">Sign In</button>
    <div id="msg-login" class="msg"></div>
    <p style="text-align:center;margin-top:14px;font-size:.85rem;color:#888;">
      <a href="#" onclick="showForgot()" style="color:#4f46e5;text-decoration:none;">Forgot password?</a>
    </p>
  </div>

  <!-- Register Form -->
  <div id="form-register" style="display:none">
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="reg-name" placeholder="Your name" autocomplete="name" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="reg-password" placeholder="Create a password" autocomplete="new-password" oninput="checkStrength()" />
        <button class="toggle-vis" onclick="toggleVis('reg-password', this)">Show</button>
      </div>
      <div class="strength-list" id="strength-list">
        <span class="strength-item" id="s-len">8+ chars</span>
        <span class="strength-item" id="s-upper">Uppercase</span>
        <span class="strength-item" id="s-lower">Lowercase</span>
        <span class="strength-item" id="s-num">Number</span>
        <span class="strength-item" id="s-special">Special char</span>
      </div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <input type="password" id="reg-confirm" placeholder="Repeat password" autocomplete="new-password" />
        <button class="toggle-vis" onclick="toggleVis('reg-confirm', this)">Show</button>
      </div>
    </div>
    <button class="btn" id="btn-register" onclick="register()">Create Account</button>
    <div id="msg-register" class="msg"></div>
  </div>

  <!-- Forgot Password (hidden) -->
  <div id="form-forgot" style="display:none">
    <p style="margin-bottom:16px;font-size:.9rem;color:#555;">Enter your email and we'll send a reset link.</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="forgot-email" placeholder="you@example.com" />
    </div>
    <button class="btn" id="btn-forgot" onclick="forgotPassword()">Send Reset Link</button>
    <div id="msg-forgot" class="msg"></div>
    <p style="text-align:center;margin-top:14px;font-size:.85rem;">
      <a href="#" onclick="showTab('login')" style="color:#4f46e5;text-decoration:none;">Back to Sign In</a>
    </p>
  </div>
</div>

<script>
  // pitfall #36: detect environment for API URL
  const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3000'
    : 'https://{{PROD_API_GATEWAY_ID}}.execute-api.{{AWS_REGION}}.amazonaws.com';

  function showTab(tab) {
    document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('form-forgot').style.display = 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function showForgot() {
    document.getElementById('form-login').style.display = 'none';
    document.getElementById('form-forgot').style.display = '';
    document.getElementById('tab-login').classList.remove('active');
    document.getElementById('tab-register').classList.remove('active');
  }

  function toggleVis(id, btn) {
    const el = document.getElementById(id);
    const hidden = el.type === 'password';
    el.type = hidden ? 'text' : 'password';
    btn.textContent = hidden ? 'Hide' : 'Show';
  }

  function checkStrength() {
    const pw = document.getElementById('reg-password').value;
    const set = (id, met) => document.getElementById(id).classList.toggle('met', met);
    set('s-len', pw.length >= 8);
    set('s-upper', /[A-Z]/.test(pw));
    set('s-lower', /[a-z]/.test(pw));
    set('s-num', /[0-9]/.test(pw));
    set('s-special', /[^A-Za-z0-9]/.test(pw));
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type}`;
  }

  async function login() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = 'Signing in…';

    try {
      const res = await fetch(`${API_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      localStorage.setItem('token', data.token);
      window.location.href = 'app.html';
    } catch (err) {
      showMsg('msg-login', err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  async function register() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm = document.getElementById('reg-confirm').value;

    if (password !== confirm) return showMsg('msg-register', 'Passwords do not match', 'error');

    const btn = document.getElementById('btn-register');
    btn.disabled = true; btn.textContent = 'Creating account…';

    try {
      const res = await fetch(`${API_URL}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Registration failed');
      showMsg('msg-register', 'Account created! Check your email to verify your address.', 'success');
    } catch (err) {
      showMsg('msg-register', err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }

  async function forgotPassword() {
    const email = document.getElementById('forgot-email').value.trim();
    const btn = document.getElementById('btn-forgot');
    btn.disabled = true; btn.textContent = 'Sending…';

    try {
      await fetch(`${API_URL}/api/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      showMsg('msg-forgot', 'If that email is registered, a reset link is on the way.', 'success');
    } catch {
      showMsg('msg-forgot', 'Something went wrong. Please try again.', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Send Reset Link';
    }
  }

  // Redirect if already logged in
  if (localStorage.getItem('token')) window.location.href = 'app.html';
</script>
</body>
</html>
