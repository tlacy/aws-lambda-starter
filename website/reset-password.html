<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — {{PROJECT_NAME}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card { background: #fff; border-radius: 16px; padding: 36px 32px; max-width: 400px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    h1 { font-size: 1.4rem; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: .9rem; }
    .input-wrap { position: relative; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: .95rem; outline: none; }
    input:focus { border-color: #4f46e5; }
    .toggle-vis { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #888; font-size: .85rem; }
    .strength-list { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
    .strength-item { font-size: .78rem; padding: 3px 8px; border-radius: 20px; background: #fee2e2; color: #ef4444; transition: all .2s; }
    .strength-item.met { background: #dcfce7; color: #16a34a; }
    .btn { width: 100%; padding: 13px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .msg { padding: 10px 14px; border-radius: 8px; margin-top: 12px; font-size: .9rem; display: none; }
    .msg.error { background: #fef2f2; color: #dc2626; display: block; }
    .msg.success { background: #f0fdf4; color: #16a34a; display: block; }
  </style>
</head>
<body>
<div class="card">
  <h1>Reset Password</h1>
  <div class="form-group">
    <label>New Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Create a strong password" oninput="checkStrength()" />
      <button class="toggle-vis" onclick="toggleVis('password', this)">Show</button>
    </div>
    <div class="strength-list">
      <span class="strength-item" id="s-len">8+ chars</span>
      <span class="strength-item" id="s-upper">Uppercase</span>
      <span class="strength-item" id="s-lower">Lowercase</span>
      <span class="strength-item" id="s-num">Number</span>
      <span class="strength-item" id="s-special">Special char</span>
    </div>
  </div>
  <div class="form-group">
    <label>Confirm Password</label>
    <div class="input-wrap">
      <input type="password" id="confirm" placeholder="Repeat password" />
      <button class="toggle-vis" onclick="toggleVis('confirm', this)">Show</button>
    </div>
  </div>
  <button class="btn" id="btn-reset" onclick="doReset()">Set New Password</button>
  <div id="msg" class="msg"></div>
</div>
<script>
  const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3000'
    : 'https://{{PROD_API_GATEWAY_ID}}.execute-api.{{AWS_REGION}}.amazonaws.com';

  const token = new URLSearchParams(window.location.search).get('token');

  function toggleVis(id, btn) {
    const el = document.getElementById(id);
    const hidden = el.type === 'password';
    el.type = hidden ? 'text' : 'password';
    btn.textContent = hidden ? 'Hide' : 'Show';
  }

  function checkStrength() {
    const pw = document.getElementById('password').value;
    const set = (id, met) => document.getElementById(id).classList.toggle('met', met);
    set('s-len', pw.length >= 8);
    set('s-upper', /[A-Z]/.test(pw));
    set('s-lower', /[a-z]/.test(pw));
    set('s-num', /[0-9]/.test(pw));
    set('s-special', /[^A-Za-z0-9]/.test(pw));
  }

  async function doReset() {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const msgEl = document.getElementById('msg');

    if (password !== confirm) {
      msgEl.textContent = 'Passwords do not match.';
      msgEl.className = 'msg error'; return;
    }

    const btn = document.getElementById('btn-reset');
    btn.disabled = true; btn.textContent = 'Setting password…';

    try {
      const res = await fetch(`${API_URL}/api/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();
      if (res.ok) {
        msgEl.textContent = '✅ Password reset! Redirecting to login…';
        msgEl.className = 'msg success';
        setTimeout(() => window.location.href = '/landing.html', 2000);
      } else {
        msgEl.textContent = data.error || 'Reset failed. The link may have expired.';
        msgEl.className = 'msg error';
      }
    } catch {
      msgEl.textContent = 'Connection error — please try again.';
      msgEl.className = 'msg error';
    } finally {
      btn.disabled = false; btn.textContent = 'Set New Password';
    }
  }
</script>
</body>
</html>
