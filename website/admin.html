<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — {{PROJECT_NAME}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #1a3a2a; --green: #2d6a4f; --accent: #52b788; --bg: #f1f5f3; --card: #fff; --light: #d8e8df; --muted: #64748b; --radius: 12px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: #1e293b; min-height: 100vh; }
    header { background: var(--navy); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.15rem; font-weight: 800; }
    .logout-btn { background: none; border: 1px solid rgba(255,255,255,.3); color: #fff; padding: 7px 14px; border-radius: 7px; cursor: pointer; font-size: .85rem; }
    main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border-radius: var(--radius); padding: 18px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
    .stat-num { font-size: 2rem; font-weight: 800; color: var(--navy); }
    .stat-lbl { font-size: .8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-top: 4px; }
    .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
    .filter-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-btn { padding: 7px 14px; border: 1.5px solid var(--light); border-radius: 20px; background: none; cursor: pointer; font-size: .85rem; font-weight: 600; }
    .filter-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
    .user-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; box-shadow: 0 2px 6px rgba(0,0,0,.05); }
    .user-info .name { font-weight: 700; }
    .user-info .email { color: var(--muted); font-size: .85rem; margin-top: 2px; }
    .user-info .meta { color: #94a3b8; font-size: .78rem; margin-top: 2px; }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: .75rem; font-weight: 700; }
    .badge-pending  { background: #fef9c3; color: #a16207; }
    .badge-active   { background: #dcfce7; color: #15803d; }
    .badge-rejected { background: #fee2e2; color: #b91c1c; }
    .badge-admin    { background: #dbeafe; color: #1d4ed8; margin-left: 6px; }
    .actions { display: flex; gap: 8px; flex-shrink: 0; }
    .action-btn { padding: 7px 12px; border: none; border-radius: 7px; cursor: pointer; font-size: .82rem; font-weight: 600; }
    .btn-approve { background: #dcfce7; color: #15803d; }
    .btn-reject  { background: #fee2e2; color: #b91c1c; }
    .empty { text-align: center; padding: 40px; color: var(--muted); }
    .msg { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: .9rem; }
    .msg.error { background: #fef2f2; color: #dc2626; }
    .msg.success { background: #f0fdf4; color: #15803d; }
  </style>
</head>
<body>
<header>
  <h1>Admin — {{PROJECT_NAME}}</h1>
  <button class="logout-btn" onclick="logout()">Log Out</button>
</header>
<main>
  <div id="errorMsg"  class="msg error"   style="display:none;"></div>
  <div id="successMsg" class="msg success" style="display:none;"></div>
  <div class="stats" id="stats"></div>
  <div class="section-title">Users</div>
  <div class="filter-tabs">
    <button class="filter-btn active" onclick="setFilter('all',      this)">All</button>
    <button class="filter-btn"        onclick="setFilter('pending',  this)">Pending</button>
    <button class="filter-btn"        onclick="setFilter('active',   this)">Active</button>
    <button class="filter-btn"        onclick="setFilter('rejected', this)">Rejected</button>
  </div>
  <div id="userList"></div>
</main>
<script>
  const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3000'
    : 'https://{{PROD_API_GATEWAY_ID}}.execute-api.{{AWS_REGION}}.amazonaws.com';

  let currentFilter = 'all';

  function token() { return localStorage.getItem('token'); }

  async function apiFetch(path, opts = {}) {
    const res = await fetch(API_URL + path, {
      ...opts,
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token()}`, ...(opts.headers || {}) },
    });
    if (res.status === 401) { logout(); return null; }
    return res;
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/landing.html';
  }

  function showMsg(type, text) {
    const el = document.getElementById(type === 'error' ? 'errorMsg' : 'successMsg');
    el.textContent = text;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  async function loadStats() {
    const res = await apiFetch('/api/admin/stats');
    if (!res || !res.ok) return;
    const { stats: s } = await res.json();
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="stat-num">${s.total    || 0}</div><div class="stat-lbl">Total Users</div></div>
      <div class="stat-card"><div class="stat-num">${s.pending  || 0}</div><div class="stat-lbl">Pending</div></div>
      <div class="stat-card"><div class="stat-num">${s.active   || 0}</div><div class="stat-lbl">Active</div></div>
      <div class="stat-card"><div class="stat-num">${s.rejected || 0}</div><div class="stat-lbl">Rejected</div></div>`;
  }

  async function loadUsers() {
    const url = currentFilter === 'all' ? '/api/admin/users' : `/api/admin/users?status=${currentFilter}`;
    const res = await apiFetch(url);
    if (!res || !res.ok) { showMsg('error', 'Failed to load users.'); return; }
    const { users } = await res.json();
    const list = document.getElementById('userList');
    if (!users || users.length === 0) {
      list.innerHTML = '<div class="empty">No users found.</div>';
      return;
    }
    list.innerHTML = users.map(u => `
      <div class="user-card" id="user-${u.id}">
        <div class="user-info">
          <div class="name">${escHtml(u.name || u.email)}${u.is_admin ? '<span class="badge badge-admin">Admin</span>' : ''}</div>
          <div class="email">${escHtml(u.email)}</div>
          <div class="meta">Joined ${formatDate(u.created_at)} · <span class="badge badge-${u.status}">${u.status}</span></div>
        </div>
        <div class="actions">
          ${u.status === 'pending'  ? `<button class="action-btn btn-approve" onclick="approveUser('${u.id}')">Approve</button>` : ''}
          ${u.status === 'pending'  ? `<button class="action-btn btn-reject"  onclick="rejectUser('${u.id}')">Reject</button>`  : ''}
          ${u.status === 'rejected' ? `<button class="action-btn btn-approve" onclick="approveUser('${u.id}')">Approve</button>` : ''}
        </div>
      </div>`).join('');
  }

  async function approveUser(id) {
    const res = await apiFetch(`/api/admin/users/${id}/approve`, { method: 'POST' });
    if (res && res.ok) { showMsg('success', 'User approved.'); loadUsers(); loadStats(); }
    else { showMsg('error', 'Failed to approve user.'); }
  }

  async function rejectUser(id) {
    const res = await apiFetch(`/api/admin/users/${id}/reject`, { method: 'POST' });
    if (res && res.ok) { showMsg('success', 'User rejected.'); loadUsers(); loadStats(); }
    else { showMsg('error', 'Failed to reject user.'); }
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadUsers();
  }

  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(d) {
    if (!d) return '';
    try { return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
    catch { return d; }
  }

  // Guard: require admin token
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token() || !user.is_admin) {
    window.location.href = '/landing.html';
  } else {
    loadStats();
    loadUsers();
  }
</script>
</body>
</html>
